<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ event.title }} | Transmissão Encerrada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Montserrat:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: {{ event.company.primary_color|default:"#e63946" }};
            --bg-body: #f8fafc;
        }

            background-color: var(--bg-body);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        /* Estilo do Logo Vivo */
        .brand-logo-container {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            padding: 5px;
            text-decoration: none;
            margin-bottom: 2rem;
        }
        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-style: italic;
            font-size: 1.8rem;
            color: #1a3454;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .brand-line {
            width: 100%;
            height: 4px;
            background: #f7811e;
            border-radius: 50% / 100% 100% 0 0;
            transform: scaleY(0.6);
        }

        .error-card {
            background: white;
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border-bottom: 8px solid var(--primary-color);
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: #64748b;
        }

        h1 {
            font-weight: 800;
            font-size: 1.5rem;
            color: #1e293b;
            margin-bottom: 1rem;
        }

        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn-back {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
            display: inline-block;
        }

        .btn-back:hover {
            transform: scale(1.05);
            color: white;
            background-color: #334155;
        }

        .company-logo {
            max-height: 40px;
            margin-bottom: 2rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="brand-logo-container">
        <span class="brand-name">Gilberto Ribeiro</span>
        <div class="brand-line"></div>
    </div>

    <div class="error-card">
        
        <div class="icon-wrapper">
            <i class="bi bi-camera-video-off fs-1"></i>
        </div>

        <h1>Transmissão Encerrada</h1>
        <p>A live <strong>"{{ event.title }}"</strong> já chegou ao fim. <br> Agradecemos a sua participação!</p>

        <a href="{% url 'company_live_dashboard' event.company.slug %}" class="btn-back">
            <i class="bi bi-grid-3x3-gap me-2"></i>Voltar para a Central
        </a>
    </div>

    <div style="text-align: center; margin-top: 2rem; opacity: 0.5; font-size: 0.8rem; padding-bottom: 2rem;">
        Desenvolvido por <a href="https://luizgustavo.tech" target="_blank" style="color: #1a3454; font-weight: bold; text-decoration: none;">luizgustavo.tech</a>
    </div>
</body>
</html>
