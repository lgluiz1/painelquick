<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar na Live | {{ event.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Montserrat:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: {{ company.primary_color|default:"#f7811e" }};
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --brand-blue: #1a3454;
            --brand-orange: #f7811e;
        }
        
        /* Estilo do Logo Vivo em modo claro/escuro */
        .brand-logo-container {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            padding: 5px;
            text-decoration: none;
            margin-bottom: 2rem;
        }
        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-style: italic;
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .brand-line {
            width: 100%;
            height: 4px;
            background: var(--brand-orange);
            border-radius: 50% / 100% 100% 0 0;
            transform: scaleY(0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, var(--primary-color) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #1e293b 0%, transparent 40%);
            opacity: 0.15;
            filter: blur(80px);
            animation: moveBg 20s infinite alternate linear;
        }

        @keyframes moveBg {
            from { transform: scale(1) translate(0, 0); }
            to { transform: scale(1.2) translate(5%, 5%); }
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 1.5rem;
        }

        .logo-box {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-box img {
            max-height: 60px;
            margin-bottom: 1rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .header-text {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-text h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-text p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.9rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.2);
        }

        option { background: var(--bg-dark); color: #fff; }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .footer-info {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <div class="container">
        <div class="logo-box">
            <div class="brand-logo-container">
                <span class="brand-name">Gilberto Ribeiro</span>
                <div class="brand-line"></div>
            </div>
        </div>

        <div class="glass-card">
            <div class="header-text">
                <h2>Identificação da Live</h2>
                <p>Por favor, informe seus dados para registrar sua presença e acessar a transmissão.</p>
            </div>

            <form id="attendanceForm">
                <div class="form-group">
                    <label>Seu Nome Completo</label>
                    <input type="text" id="name" name="name" placeholder="Ex: João Silva" required>
                </div>
                <div class="form-group">
                    <label>Sua Filial/Unidade</label>
                    <select id="branch" name="branch" required>
                        <option value="">Selecione...</option>
                        {% for branch in branches %}
                            <option value="{{ branch.id }}">{{ branch.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">
                    CONFIRMAR E ENTRAR <i class="bi bi-arrow-right"></i>
                </button>
            </form>
        </div>

        <div class="footer-info">
            Plataforma de Transmissão Inteligente &copy; {{ now|date:"Y" }}
        </div>

        <div class="text-center mt-5 small text-muted opacity-50">
            Desenvolvido por <a href="https://luizgustavo.tech" target="_blank" class="text-white text-decoration-none fw-bold">luizgustavo.tech</a>
        </div>
    </div>

    <script>
        document.getElementById('attendanceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processando...';

            const data = {
                event_id: "{{ event.id }}",
                name: document.getElementById('name').value,
                branch_id: document.getElementById('branch').value
            };

            try {
                const response = await fetch("{% url 'register_live_attendance' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (result.status === 'success') {
                    window.location.reload();
                } else {
                    alert('Erro: ' + (result.error || result.message));
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'CONFIRMAR E ENTRAR';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Erro de conexão ao servidor.');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
