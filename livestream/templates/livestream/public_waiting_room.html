<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Espera | {{ event.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
            --brand-orange: #f7811e;
        }
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 2rem;
            margin: 0;
        }
        
        /* Estilo do Logo Vivo */
        .brand-logo-container {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            padding: 5px;
            text-decoration: none;
            margin-bottom: 2rem;
        }
        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-style: italic;
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .brand-line {
            width: 100%;
            height: 4px;
            background: var(--brand-orange);
            border-radius: 50% / 100% 100% 0 0;
            transform: scaleY(0.6);
        }
        .waiting-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 3rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        .countdown {
            font-size: 4rem;
            font-weight: 800;
            margin: 2rem 0;
            letter-spacing: -2px;
            color: var(--primary-color);
            text-shadow: 0 0 20px rgba(0, 123, 255, 0.3);
        }
        .status-badge {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }
        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
        }
    </style>
</head>
<body>
        <div class="brand-logo-container">
            <span class="brand-name">Gilberto Ribeiro</span>
            <div class="brand-line"></div>
        </div>
        
        <h2 class="fw-bold mb-2">{{ event.title }}</h2>
        <p class="text-white-50 mb-4">Olá, <strong>{{ user_name }}</strong>. Prepare seu café, a transmissão começará em breve.</p>

        <div class="status-badge mb-1">
            <i class="bi bi-clock-history"></i> Sala de Espera
        </div>

        <div id="countdown" class="countdown">00:00:00</div>
        
        <div id="status-msg" class="text-white-50 small mb-0">
            Aguardando sinal do administrador<span class="loading-dots"></span>
        </div>
    </div>

    <script>
        const targetDate = new Date("{{ event.start_time|date:'Y-m-d H:i:s' }}").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('countdown').innerText = "LIVE EM INSTANTES";
                document.getElementById('status-msg').innerText = "O Especialista já vai entrar, permaneça nesta página.";
                return;
            }

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerText = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // Checar status da live periodicamente
        function checkStatus() {
            fetch("{% url 'live_status_api' event.id %}")
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'live') {
                        window.location.reload(); // Se ficou live, recarrega para cair no player
                    }
                });
        }

        setInterval(updateCountdown, 1000);
        setInterval(checkStatus, 3000);
        updateCountdown();
    </script>
    <div style="text-align: center; margin-top: 3rem; opacity: 0.5; font-size: 0.8rem; color: white; padding-bottom: 2rem;">
        Desenvolvido por <a href="https://luizgustavo.tech" target="_blank" style="color: #ffffff; text-decoration: none; font-weight: bold;">luizgustavo.tech</a>
    </div>
</body>
</html>
