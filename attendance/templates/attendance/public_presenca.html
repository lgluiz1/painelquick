<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presença | {{ company.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --primary-color: {{ company.primary_color|default:'#e63946' }}; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .header-brand { background-color: var(--primary-color); color: white; padding: 40px 20px; text-align: center; }
        #signature-pad { 
            border: 2px dashed #ddd; 
            background: #fafafa; 
            width: 100%; 
            height: 250px; 
            border-radius: 12px; 
            touch-action: none; 
        }
        .btn-submit { background-color: var(--primary-color); color: white; font-weight: bold; border-radius: 10px; padding: 15px; border: none; width: 100%; transition: 0.3s; }
        .btn-submit:hover { opacity: 0.9; filter: brightness(1.1); color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card" id="mainCard">
                <div class="header-brand">
                    {% if company.logo_url %}
                    <img src="{{ company.logo_url }}" style="max-height: 80px; filter: brightness(0) invert(1);" class="mb-3">
                    {% else %}
                    <img src="https://quickdelivery.com.br/wp-content/uploads/2025/09/logo-quick-delivery-solucoes-em-logistica.webp" style="max-height: 60px; filter: brightness(0) invert(1);" class="mb-3">
                    {% endif %}
                    <h3 class="fw-bold m-0">Lista de Presença</h3>
                    <p class="small opacity-75 mt-1 mb-0">{{ company.name }}</p>
                </div>

                <div class="p-4 p-md-5" id="formArea">
                    <form id="attendanceForm">
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted text-uppercase">Nome Completo</label>
                            <input type="text" id="nome" class="form-control form-control-lg border-0 bg-light" required placeholder="Digite seu nome">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted text-uppercase">Sua Filial (Unidade)</label>
                            <select id="filial" class="form-select form-select-lg border-0 bg-light" required>
                                <option value="">Selecione...</option>
                                {% for branch in branches %}
                                <option value="{{ branch.name }}">{{ branch.name }}</option>
                                {% empty %}
                                <option value="Geral">Unidade Única</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted text-uppercase">Assinatura Digital</label>
                            <canvas id="signature-pad"></canvas>
                            <button type="button" class="btn btn-sm btn-link text-muted text-decoration-none w-100 mt-2" onclick="signaturePad.clear()">Limpar Assinatura</button>
                        </div>
                        <button type="submit" class="btn-submit shadow-sm mt-2">Confirmar Presença</button>
                    </form>
                </div>

                <div id="successArea" class="p-5 text-center d-none">
                    <div class="mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" fill="var(--primary-color)" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                        </svg>
                    </div>
                    <h2 class="fw-bold">Presença Registrada!</h2>
                    <p class="text-muted">Seu registro foi enviado com sucesso.</p>
                    <button class="btn btn-light rounded-pill px-4 mt-3" onclick="location.reload()">Novo Registro</button>
                </div>
            </div>
            <div class="text-center mt-4 small text-muted opacity-50">
                Desenvolvido por <a href="https://luizgustavo.tech" target="_blank" class="text-primary text-decoration-none fw-bold">luizgustavo.tech</a>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Alerta -->
<div class="modal fade" id="alertModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4 text-center">
                <h5 class="fw-bold mb-3" id="alertTitle">Atenção</h5>
                <p class="text-muted mb-4" id="alertMessage"></p>
                <button type="button" class="btn btn-dark rounded-pill px-5" data-bs-dismiss="modal">Entendido</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let alertModal;
    document.addEventListener('DOMContentLoaded', function() {
        alertModal = new bootstrap.Modal(document.getElementById('alertModal'));
    });

    function showAlert(title, msg) {
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMessage').innerText = msg;
        alertModal.show();
    }

    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(250, 250, 250)' });

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear(); 
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    document.getElementById('attendanceForm').onsubmit = async (e) => {
        e.preventDefault();
        
        if (signaturePad.isEmpty()) {
            showAlert("Campo Obrigatório", "Por favor, faça sua assinatura antes de enviar.");
            return;
        }

        const payload = {
            nome: document.getElementById('nome').value,
            filial: document.getElementById('filial').value,
            reuniaoId: '{{ reuniao_id|default:"Geral" }}',
            assinatura: signaturePad.toDataURL() 
        };

        try {
            const response = await fetch('/api/submit-attendance/', { 
                method: 'POST', 
                headers: {
                    'Content-Type': 'application/json',
                    'X-Api-Key': '{{ company.api_token }}'
                },
                body: JSON.stringify(payload) 
            });

            if (response.ok) {
                document.getElementById('formArea').classList.add('d-none');
                document.getElementById('successArea').classList.remove('d-none');
            } else {
                showAlert("Erro", "Ocorreu um erro ao registrar sua presença. Tente novamente.");
            }
        } catch (err) {
            showAlert("Erro de Conexão", "Não foi possível conectar ao servidor. Verifique sua internet.");
        }
    };
</script>
</body>
</html>
