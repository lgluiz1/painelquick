<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portal do Capelão{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-bg: #1a1c23;
            --sidebar-width: 250px;
            --accent-color: #4f46e5;
        }
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--primary-bg);
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 20px;
            transition: all 0.3s;
        }
        .nav-link { color: #9ca3af; padding: 12px 20px; border-radius: 8px; margin: 4px 15px; }
        .nav-link:hover, .nav-link.active { background-color: rgba(255,255,255,0.1); color: white; }
        .nav-link i { margin-right: 10px; }
        .card-stat { border: none; border-radius: 12px; transition: transform 0.2s; }
        .card-stat:hover { transform: translateY(-5px); }
        
        @media (max-width: 768px) {
            .sidebar { left: -100%; }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="p-4 text-center border-bottom border-secondary mb-3">
        <h5 class="fw-bold m-0"><i class="bi bi-shield-check me-2 text-primary"></i>CAPELÃO</h5>
    </div>
    <nav class="nav flex-column">
        <a class="nav-link active" href="{% url 'portal_dashboard' %}"><i class="bi bi-grid-1x2"></i> Dashboard</a>
        <a class="nav-link" href="#"><i class="bi bi-building"></i> Empresas</a>
        <a class="nav-link" href="#"><i class="bi bi-people"></i> Usuários</a>
        <a class="nav-link" href="#"><i class="bi bi-gear"></i> Configurações</a>
        <div class="mt-5 border-top border-secondary pt-3">
            <a class="nav-link text-danger" href="#"><i class="bi bi-box-arrow-left"></i> Sair</a>
        </div>
    </nav>
</div>

<div class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-4">
        <button class="btn d-md-none border" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
        <h4 class="fw-bold m-0">{% block header_title %}Painel Geral{% endblock %}</h4>
        <div class="dropdown">
            <button class="btn btn-white bg-white shadow-sm dropdown-toggle rounded-pill px-3" data-bs-toggle="dropdown">
                Capelão <i class="bi bi-person-circle ms-2"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end border-0 shadow">
                <li><a class="dropdown-item" href="#">Meu Perfil</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="#">Sair</a></li>
            </ul>
        </div>
    </header>

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }
</script>
</body>
</html>
