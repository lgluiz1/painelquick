{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Portal Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #1a1c23; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .btn-primary { background-color: #4f46e5; border: none; }
        .btn-primary:hover { background-color: #4338ca; }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="mb-4">
        <img src="{% static 'attendance/img/logo_saas.jpg' %}" alt="Logo" class="img-fluid mb-3" style="width: 200px;">
        <h3 class="fw-bold mt-2">Área Administrativa</h3>
        <p class="text-muted small">Entre com suas credenciais de administrador</p>
    </div>
    
    {% if error %}
    <div class="alert alert-danger small py-2">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold">E-mail ou Usuário</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control border-0 bg-light" name="username" required>
            </div>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small fw-bold">Senha</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control border-0 bg-light" name="password" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm fw-bold">Entrar no Sistema</button>
    </form>

    <div class="mt-4">
        <p class="small text-muted mb-0">Proteção Multi-Empresa SaaS &copy; 2026</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
