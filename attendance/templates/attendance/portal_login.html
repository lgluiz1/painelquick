{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Portal Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Fonte Montserrat para o Logo -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1a3454;
            --brand-orange: #f7811e;
        }
        body { 
            background-color: #1a1c23; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .btn-primary { background-color: #4f46e5; border: none; }
        .btn-primary:hover { background-color: #4338ca; }
        .btn-primary:hover { background-color: #4338ca; }

        /* Estilo do Logo Vivo */
        .brand-logo-container {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            padding: 5px;
            text-decoration: none;
        }
        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-style: italic;
            font-size: 1.8rem;
            color: var(--brand-blue);
            margin-bottom: 2px;
            letter-spacing: -0.5px;
        }
        .brand-line {
            width: 100%;
            height: 4px;
            background: var(--brand-orange);
            border-radius: 50% / 100% 100% 0 0;
            transform: scaleY(0.6);
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="mb-4">
        <div class="brand-logo-container mb-3">
            <span class="brand-name">Gilberto Ribeiro</span>
            <div class="brand-line"></div>
        </div>
        <h3 class="fw-bold mt-2">Área Administrativa</h3>
        <p class="text-muted small">Entre com suas credenciais de administrador</p>
    </div>
    
    {% if error %}
    <div class="alert alert-danger small py-2">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold">E-mail ou Usuário</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control border-0 bg-light" name="username" required>
            </div>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small fw-bold">Senha</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control border-0 bg-light" name="password" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm fw-bold">Entrar no Sistema</button>
    </form>

    <div class="mt-4">
        <p class="small text-muted mb-0">Proteção Multi-Empresa SaaS &copy; 2026</p>
        <p class="small mt-1">
            Desenvolvido por <a href="https://luizgustavo.tech" target="_blank" class="text-primary text-decoration-none fw-bold">luizgustavo.tech</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
