{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado pelo seu Feedback!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0f172a;
            --brand-orange: #f7811e;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .success-card {
            background: white;
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            max-width: 500px;
            animation: slideUp 0.8s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .check-circle {
            width: 100px;
            height: 100px;
            background: #dcfce7;
            color: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
            transform: scale(0);
            opacity: 0;
        }

        @keyframes scaleIn {
            to { opacity: 1; transform: scale(1); }
        }

        h1 { color: var(--brand-blue); font-weight: 700; margin-bottom: 20px; }
        p { color: #64748b; line-height: 1.6; margin-bottom: 30px; }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        .progress-fill {
            height: 100%;
            background: var(--brand-orange);
            width: 0%;
            animation: fillProgress 5s linear forwards;
        }

        @keyframes fillProgress {
            to { width: 100%; }
        }

        .btn-home {
            background: var(--brand-blue);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 30px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-home:hover { background: var(--brand-orange); color: white; transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="success-card">
    <div class="check-circle">
        <i class="bi bi-check-lg"></i>
    </div>
    <h1>Obrigado, {{ company.name }}!</h1>
    <p>Seu depoimento foi enviado com sucesso e está sendo processado pelo Gilberto Ribeiro. Agradecemos por compartilhar sua experiência!</p>
    
    <a href="{% url 'home' %}" class="btn-home shadow-sm">Voltar para a Home agora</a>

    <div class="mt-4">
        <small class="text-muted">Você será redirecionado automaticamente em alguns segundos...</small>
        <div class="progress-bar-container">
            <div class="progress-fill"></div>
        </div>
    </div>
</div>

<script>
    // Redirecionamento automático após 5 segundos
    setTimeout(function() {
        window.location.href = "{% url 'home' %}";
    }, 5000);
</script>

</body>
</html>
